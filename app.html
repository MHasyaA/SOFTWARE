<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMC — Air Compressor Management System</title>
  <meta name="description" content="IoT Air Compressor Monitoring & Control — PT. Braja Mukti Cakra">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="css/style.css">

  <!-- Flash-prevention: apply theme before render -->
  <script>
    (function(){
      const t = localStorage.getItem('bmc_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="app-shell" id="appShell">

  <!-- ═══════════════════════════════════════════════════
       SIDEBAR
  ═══════════════════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">

    <!-- Brand -->
    <div class="sidebar-brand">
      <div class="sidebar-logo-mark" style="background:transparent; box-shadow:none; width:48px; height:48px;">
        <img src="bmc-logo.png" style="width:100%; height:100%; object-fit:contain;">
      </div>
      <div class="sidebar-brand-text">
        <span class="brand-name">BMC</span>
        <span class="brand-sub">BRAJA MUKTI CAKRA</span>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav" id="sidebarNav">

      <button class="sidebar-item" data-page="overview" id="snav-overview">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Dashboard</span>
      </button>

      <button class="sidebar-item" data-page="detail" id="snav-detail">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="3" x2="12" y2="8"/><line x1="12" y1="16" x2="12" y2="21"/>
        </svg>
        <span>Machine Detail</span>
      </button>

      <button class="sidebar-item" data-page="cockpit" id="snav-cockpit">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2a10 10 0 0 1 10 10"/><path d="M12 6a6 6 0 0 1 6 6"/>
          <circle cx="12" cy="12" r="2"/>
          <line x1="12" y1="14" x2="12" y2="22"/>
        </svg>
        <span>Cockpit</span>
      </button>

      <button class="sidebar-item" data-page="settings" id="snav-settings">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span>Schedulling</span>
      </button>

      <button class="sidebar-item" data-page="trend" id="snav-trend">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
          <line x1="3" y1="20" x2="21" y2="20"/>
        </svg>
        <span>Analytics</span>
      </button>

      <button class="sidebar-item" data-page="alarm" id="snav-alarm">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span>Alarm</span>
        <span class="sidebar-alarm-badge" id="alarmNavBadge" hidden>0</span>
      </button>

    </nav>

    <!-- Footer: mode + WS status -->
    <div class="sidebar-footer">
      <div class="ws-indicator ws-disconnected" id="wsIndicator" style="font-size:8px;padding:2px 10px">OFFLINE</div>
      <div class="mode-badge mode-manual" id="modeBadge">MANUAL</div>
      <div class="mode-label">
        <span class="condition-dot condition-off" id="conditionDot"></span>
        <span id="conditionLabel">COND OFF</span>
      </div>
    </div>

  </aside><!-- /sidebar -->

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ═══════════════════════════════════════════════════
       MAIN AREA
  ═══════════════════════════════════════════════════ -->
  <div class="main-area">

    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-icon btn-sidebar-toggle" id="sidebarToggle" title="Toggle Menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <span class="topbar-system-title">Air Compressor Management System</span>
      </div>

      <div class="topbar-right">
        <div class="topbar-clock-wrap">
          <span class="topbar-clock" id="clock">00:00:00</span>
          <span class="topbar-date" id="dateDisplay">—</span>
        </div>
        <span class="user-name" id="topbarUserName">—</span>
        <span id="topbarRoleBadge"></span>
        <button class="btn-icon btn-theme" id="themeToggle" title="Ganti Tema">🌙</button>
        <button class="btn-icon btn-logout" id="btnLogout" onclick="AUTH.logout()" title="Logout">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content" id="pageContent">
      <div class="loading-state">
        <div class="spinner"></div>
      </div>
    </main>

  </div><!-- /main-area -->

</div><!-- /app-shell -->

<!-- Toast & Modal containers -->
<div class="toast-container" id="toastContainer"></div>
<div id="modalContainer"></div>

<!-- ── Scripts ── -->
<script src="js2/config.js"></script>
<script src="js2/state.js"></script>
<script src="js2/auth.js"></script>
<script src="js2/router.js"></script>
<script src="js2/websocket.js"></script>
<script src="js2/pages/overview.js"></script>
<script src="js2/pages/detail.js"></script>
<script src="js2/pages/trend.js"></script>
<script src="js2/pages/cockpit.js"></script>
<script src="js2/pages/alarm.js"></script>
<script src="js2/pages/settings.js"></script>
<script src="js2/app.js"></script>

</body>
</html>
