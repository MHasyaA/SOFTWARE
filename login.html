<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — BMC Air Compressor System</title>
  <meta name="description" content="Login to the BMC Air Compressor Management System">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
  <script>
    // Apply saved theme before render to avoid flash
    (function(){
      const t = localStorage.getItem('bmc_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body class="login-page">

  <!-- Theme toggle (fixed top-right) -->
  <button class="login-theme-toggle" id="loginThemeToggle" title="Toggle Theme">🌙</button>

  <!-- Floating particles -->
  <div class="login-particles" id="particles"></div>

  <div class="login-container">
    <div class="login-card">

      <!-- Header -->
      <div class="login-header">
        <div class="login-logo-wrap">
          <svg class="login-logo-svg" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="17" stroke="url(#gl)" stroke-width="1.5" opacity="0.6"/>
            <circle cx="20" cy="20" r="10" stroke="url(#gl)" stroke-width="1.5" opacity="0.9"/>
            <circle cx="20" cy="20" r="4" fill="url(#gl)"/>
            <path d="M20 9 L20 14 M20 26 L20 31 M9 20 L14 20 M26 20 L31 20" stroke="url(#gl)" stroke-width="1.5" stroke-linecap="round"/>
            <defs>
              <linearGradient id="gl" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#22d3ee"/>
                <stop offset="100%" stop-color="#4ade80"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="login-title">Air Compressor Management</div>
        <div class="login-subtitle">Industrial Monitoring &amp; Control System</div>
        <span class="login-client">PT. Braja Mukti Cakra</span>
      </div>

      <!-- Form -->
      <form class="login-form" id="loginForm" autocomplete="off">

        <div class="login-input-group">
          <label class="login-label" for="loginUsername">Username</label>
          <div class="login-input-wrap">
            <span class="login-input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input id="loginUsername" class="login-input" type="text" placeholder="Masukkan username" autocomplete="username" required>
          </div>
        </div>

        <div class="login-input-group">
          <label class="login-label" for="loginPassword">Password</label>
          <div class="login-input-wrap">
            <span class="login-input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input id="loginPassword" class="login-input" type="password" placeholder="Masukkan password" autocomplete="current-password" required>
          </div>
        </div>

        <div class="login-error" id="loginError" role="alert">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="loginErrorText">Username atau password salah.</span>
        </div>

        <button class="login-btn" id="loginBtn" type="submit">
          <span class="login-btn-text">MASUK</span>
          <div class="login-btn-spinner"></div>
        </button>
      </form>

      <div class="login-footer">
        <strong>BMC ACMS</strong> v1.0 &nbsp;·&nbsp; Node-RED Backend &nbsp;·&nbsp; <span id="loginThemeLabel">Mode Malam</span>
      </div>
    </div>
  </div>

  <script src="js2/config.js"></script>
  <script src="js2/auth.js"></script>
  <script>
    // ─── Redirect if already logged in ─────────────────────
    if (AUTH.getSession()) window.location.replace('app.html?nc=' + Date.now());

    // ─── Theme toggle ───────────────────────────────────────
    const themeBtn  = document.getElementById('loginThemeToggle');
    const themeLabel= document.getElementById('loginThemeLabel');
    function updateThemeBtn() {
      const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
      themeBtn.textContent = isDark ? '☀️' : '🌙';
      themeLabel.textContent = isDark ? 'Mode Malam' : 'Mode Siang';
    }
    updateThemeBtn();
    themeBtn.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme') || 'dark';
      const next    = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('bmc_theme', next);
      updateThemeBtn();
    });

    // ─── Particles ──────────────────────────────────────────
    const container = document.getElementById('particles');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        animation-duration: ${7 + Math.random() * 8}s;
        animation-delay: ${Math.random() * 10}s;
        width: ${1 + Math.random() * 2}px;
        height: ${1 + Math.random() * 2}px;
        background: ${Math.random() > 0.5 ? '#22d3ee' : '#4ade80'};
      `;
      container.appendChild(p);
    }

    // ─── Login form ─────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', e => {
      e.preventDefault();
      const btn      = document.getElementById('loginBtn');
      const errorEl  = document.getElementById('loginError');
      const errorTxt = document.getElementById('loginErrorText');
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;

      btn.classList.add('loading');
      btn.disabled = true;
      errorEl.classList.remove('visible');

      setTimeout(() => {
        const result = AUTH.login(username, password);
        if (result.success) {
          window.location.replace('app.html?nc=' + Date.now());
        } else {
          errorTxt.textContent = result.message;
          errorEl.classList.add('visible');
          btn.classList.remove('loading');
          btn.disabled = false;
          document.getElementById('loginPassword').value = '';
          document.getElementById('loginPassword').focus();
        }
      }, 500);
    });
  </script>
</body>
</html>
